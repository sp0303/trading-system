server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: system_logs
    static_configs:
    - targets:
        - localhost
      labels:
        job: varlogs
        __path__: /var/log/trading/*.log
    pipeline_stages:
    - match:
        selector: '{job="varlogs"}'
        stages:
        - regex:
            # Extract service name from the filename
            source: filename
            expression: "/var/log/trading/(?P<service_name>[^.]+)\\.log"
        - labels:
            service_name:
